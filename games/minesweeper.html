<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>小游戏 - 扫雷 - ZZ H Lab</title>
    <style>
        body { background: #050505; color: #fff; text-align: center; font-family: sans-serif; }
        #board { display: inline-block; border: 5px solid #333; margin-top: 20px; cursor: default; }
        .row { display: flex; }
        .cell { width: 30px; height: 30px; border: 1px solid #444; background: #222; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        .cell.revealed { background: #444; }
        .cell.mine { background: red; }
        .cell.flag { background: orange; }
    </style>
</head>
<body>
    <h1>小游戏 - 扫雷</h1>
    <div id="board" oncontextmenu="return false;"></div>
    <p>左键点击开格，右键点击插旗 (🚩)</p>
    <a href="../games.html">← 返回小游戏</a>

    <script>
        const size = 10, mineCount = 10;
        let board = [], revealed = [], flagged = [];

        function init() {
            board = Array(size).fill().map(() => Array(size).fill(0));
            revealed = Array(size).fill().map(() => Array(size).fill(false));
            flagged = Array(size).fill().map(() => Array(size).fill(false));
            
            let placed = 0;
            while(placed < mineCount) {
                let r = Math.floor(Math.random()*size), c = Math.floor(Math.random()*size);
                if(board[r][c] !== 'mine') { board[r][c] = 'mine'; placed++; }
            }
            // 计算周围数字
            for(let r=0; r<size; r++) for(let c=0; c<size; c++) {
                if(board[r][c] === 'mine') continue;
                let count = 0;
                for(let dr=-1; dr<=1; dr++) for(let dc=-1; dc<=1; dc++) {
                    if(r+dr>=0 && r+dr<size && c+dc>=0 && c+dc<size && board[r+dr][c+dc] === 'mine') count++;
                }
                board[r][c] = count;
            }
            render();
        }

        function render() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            for(let r=0; r<size; r++) {
                let rowEl = document.createElement('div'); rowEl.className = 'row';
                for(let c=0; c<size; c++) {
                    let cell = document.createElement('div');
                    cell.className = 'cell';
                    if(revealed[r][c]) { cell.className += ' revealed'; cell.innerText = board[r][c] || ''; }
                    if(flagged[r][c]) { cell.className += ' flag'; cell.innerText = '🚩'; }
                    cell.onclick = () => reveal(r, c);
                    cell.oncontextmenu = () => { flagged[r][c] = !flagged[r][c]; render(); };
                    rowEl.appendChild(cell);
                }
                boardEl.appendChild(rowEl);
            }
        }

        function reveal(r, c) {
            if(revealed[r][c] || flagged[r][c]) return;
            if(board[r][c] === 'mine') { alert('💣 你炸了！'); init(); return; }
            revealed[r][c] = true;
            render();
        }
        init();
    </script>
</body>
</html>
